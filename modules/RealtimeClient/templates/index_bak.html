<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>视频播放器 + 实时字幕识别</title>
  <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet">
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.0/dist/hls.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #121212;
      color: #fff;
      font-family: sans-serif;
    }


    #my-video {
      width: 100%;
      height: 100%;
      object-fit: contain; /* 保持比例，完整显示 */
      background-color: #000; /* 填充空白区域 */
    }

    .top-section {
      display: flex;
      flex-direction: row;
      padding: 20px;
    }

    .left-panel {
      width: 40%;
      padding-right: 10px;
    }

    .right-panel {
      width: 60%;
    }

    .video-container {
      position: relative;
      width: 100%;
      height: 450px;
      background-color: #000;
    }

    .video-placeholder {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 1.2rem;
      z-index: 1;
      pointer-events: none;
    }

    .upload-btn {
      margin-bottom: 10px;
    }

    input[type="url"], input[type="file"] {
      width: 100%;
      padding: 6px;
    }

    .bottom-section {
      display: flex;
      flex-direction: row;
      padding: 0 20px 20px 20px;
    }

    #subtitles {
      margin-top: 15px;
      border: 1px solid #444;
      padding: 12px;
      height: 150px;
      overflow-y: auto;
      background-color: #1e1e1e !important;
      color: #ffffff;
      text-align: left;
      font-size: 14px;
      border-radius: 4px;
      box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.3);
    }

    .subtitle-block {
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px dashed #444;
    }

    .original {
      font-weight: bold;
      color: #ffffff;
    }

    .translated {
      color: #cccccc;
      margin-top: 4px;
    }


    #subtitlePopup {
      position: fixed;
      top: 50px;
      left: 50px;
      background-color: black;
      color: white;
      font-size: 18px;
      font-weight: bold;
      padding: 10px 20px;
      border-radius: 10px;
      z-index: 9999;
      max-width: 80%;
      cursor: move;
      user-select: none;
      line-height: 1.5;
      display: none;
    }

    #popupSettings {
      margin-top: 20px;
      padding: 10px;
      border: 1px solid #ccc;
      background-color: #1e1e1e;
    }

    label {
      display: block;
      margin-bottom: 8px;
    }

    select, input[type="number"], input[type="color"], input[type="range"] {
      margin-left: 5px;
    }

    button {
      margin-top: 10px;
      padding: 5px 10px;
    }

    .subtitle-panel {
      margin-top: 15px;
      border: 1px solid #444;
      padding: 12px;
      height: 200px;
      overflow-y: auto;
      background-color: #1e1e1e;
      color: #ffffff;
      text-align: left;
      font-size: 14px;
      border-radius: 4px;
      box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.3);
    }

  </style>
</head>
<body>

<div class="top-section">
  <div class="left-panel">
    <h3>音频识别与翻译</h3>
    <form id="recognitionForm">
      <label>源语言:
        <select name="lang" id="lang">
          <option value="en">英语</option>
          <option value="cn">中文</option>
          <option value="ja">日语</option>
          <option value="ar">阿拉伯语</option>
          <option value="fr">法语</option>
          <option value="de">德语</option>
          <option value="es">西班牙语</option>
          <option value="ru">俄语</option>
          <option value="vi">越南语</option>
        </select>
      </label>

      <label>翻译语言:
        <select name="targetLang" id="targetLang">
          <option value="cn">中文</option>
          <option value="en">英语</option>
          <option value="ja">日语</option>
          <option value="ar">阿拉伯语</option>
          <option value="fr">法语</option>
          <option value="de">德语</option>
          <option value="es">西班牙语</option>
          <option value="ru">俄语</option>
          <option value="vi">越南语</option>
        </select>
      </label>

      <button type="submit">开始识别</button>
      <button id="stopButton" type="button">停止识别</button>
      <p id="engineStatus">字幕引擎状态：🛑 已停止</p>
      <p id="subtitleCount">字幕条数：0</p>
      <button id="clearButton" type="button">清空字幕</button>
      <button id="exportButton" type="button">导出字幕（SRT格式）</button>
      <button id="togglePopup" type="button">开启字幕浮窗</button>
    </form>

    <div id="popupSettings">
      <h3>字幕样式配置</h3>
      <label>字体:
        <select id="fontFamilySelect">
          <option value="Arial">Arial</option>
          <option value="Verdana">Verdana</option>
          <option value="Microsoft YaHei">微软雅黑</option>
          <option value="Times New Roman">Times New Roman</option>
          <option value="monospace">Monospace</option>
        </select>
      </label>
      <label>颜色:
        <input type="color" id="fontColorPicker" value="#FFFFFF">
      </label>
      <label>大小:
        <input type="number" id="fontSizeInput" min="10" max="60" value="20"> px
      </label>
      <label>背景颜色:
        <input type="color" id="bgColorPicker" value="#000000">
      </label>
      <label>背景透明度:
        <input type="range" id="bgOpacitySlider" min="0" max="1" step="0.05" value="1">
      </label>
      <button id="applyPopupStyle">应用设置</button>
    </div>

    <!-- 资源监控 -->
    <h3>系统资源监控</h3>
    <div id="systemStats" style="font-size: 14px; line-height: 1.6;"></div>
    <canvas id="systemChart" height="120"></canvas>
  </div>

  <div class="right-panel">
    <h3>视频播放器</h3>
    <div class="upload-btn">
      <input type="file" id="fileInput" accept="video/*"/>
      <br><br>
      <input type="url" id="m3u8Url" placeholder="或粘贴 .m3u8 视频地址"/>
      <button onclick="loadM3U8()">加载 HLS 视频</button>
    </div>
    <div class="video-container">
      <div id="placeholder" class="video-placeholder">请导入本地视频或输入 HLS 地址</div>
      <video id="my-video" class="video-js vjs-default-skin" controls preload="auto" width="100%" height="450"></video>
    </div>
    <div id="subtitles" class="subtitle-panel"></div>
  </div>
</div>

<!-- 字幕浮窗 -->
<div id="subtitlePopup">
  <div id="popupOriginal">原文：...</div>
  <div id="popupTranslation">翻译：...</div>
  <button id="toggleTranslation">隐藏翻译</button>
  <button id="closePopup">关闭</button>
</div>


<!-- 引入 Video.js 和 HLS.js -->
<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.0/dist/hls.min.js"></script>

<script>
  const maxDataPoints = 30;
  const labels = [];
  const ctx = document.getElementById('systemChart').getContext('2d');

  const systemChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'CPU 使用率 (%)',
          borderColor: 'rgb(255, 99, 132)',
          backgroundColor: 'rgba(255, 99, 132, 0.1)',
          data: [],
          tension: 0.3
        },
        {
          label: '内存使用率 (%)',
          borderColor: 'rgb(54, 162, 235)',
          backgroundColor: 'rgba(54, 162, 235, 0.1)',
          data: [],
          tension: 0.3
        },
        {
          label: 'GPU 使用率 (%)',
          borderColor: 'rgb(255, 206, 86)',
          backgroundColor: 'rgba(255, 206, 86, 0.1)',
          data: [],
          tension: 0.3
        },
        {
          label: '显存占用率 (%)',  // ✅ 新增显存图层
          borderColor: 'rgb(153, 102, 255)',
          backgroundColor: 'rgba(153, 102, 255, 0.1)',
          data: [],
          tension: 0.3
        }
      ]
    },




    options: {
      animation: false,
      responsive: true,
      scales: {
        y: {
          beginAtZero: true,
          max: 100,
        },
        /*
        x: {
            ticks: {
                maxRotation: 90,
                minRotation: 30
            }
        }
        */
        x: {
          display: false  // ✅ 完全隐藏 X 轴
        }



      },
      plugins: {
        legend: {
          labels: {
            color: 'white'
          }
        }
      }
    }
  });

  function updateCharts(data) {
    const timeLabel = new Date().toLocaleTimeString();

    if (labels.length >= maxDataPoints) {
        labels.shift();
        systemChart.data.datasets.forEach(ds => ds.data.shift());
    }

    labels.push(timeLabel);

    systemChart.data.datasets[0].data.push(data.cpu_percent);
    systemChart.data.datasets[1].data.push(data.memory_percent);

    const gpuUtil = (data.gpu && data.gpu.length > 0 && data.gpu[0].gpu_util !== undefined)
        ? data.gpu[0].gpu_util
        : 0;
    systemChart.data.datasets[2].data.push(gpuUtil);

    const gpuMemUtil = (data.gpu && data.gpu.length > 0 && data.gpu[0].memory_percent !== undefined)
        ? data.gpu[0].memory_percent
        : 0;
    systemChart.data.datasets[3].data.push(gpuMemUtil);  // ✅ 显存占用率

    systemChart.update();
}




  // 资源监控
  function updateSystemStats() {
    fetch('/system_stats')
      .then(res => res.json())
      .then(data => {
        let html = `
                    🧠 内存：${data.memory_used.toFixed(1)} / ${data.memory_total.toFixed(1)} GB (${data.memory_percent}%)<br>
                    ⚙️ CPU 使用率：${data.cpu_percent}%<br>
                `;

        if (data.gpu && data.gpu.length > 0) {
          data.gpu.forEach((gpu, index) => {
            if (gpu.error) {
              html += `GPU ${index}: 读取失败 (${gpu.error})<br>`;
            } else {
              html += `🎮 GPU ${index} (${gpu.name})：<br>
                            ${(gpu.memory_used/1024).toFixed(1)} / ${(gpu.memory_total/1024).toFixed(1)} GB (${gpu.memory_percent}%)，使用率 ${gpu.gpu_util}%<br>`;
            }
          });
        } else {
          html += `🎮 GPU 信息不可用（可能未安装 NVIDIA 驱动）<br>`;
        }

        document.getElementById('systemStats').innerHTML = html;
        updateCharts(data);  // 动态更新图表

      })
      .catch(err => {
        document.getElementById('systemStats').innerHTML = '❌ 获取失败：' + err;
      });
  }

  // 每 2 秒更新一次系统资源信息
  setInterval(updateSystemStats, 2000);
  updateSystemStats(); // 初始调用

  const fileInput = document.getElementById('fileInput');
  const m3u8UrlInput = document.getElementById('m3u8Url');
  const placeholder = document.getElementById('placeholder');
  const video = document.getElementById('my-video');
  const player = videojs(video);

  // 加载本地视频
  fileInput.addEventListener('change', function () {
    const file = this.files[0];
    if (!file) return;

    const fileURL = URL.createObjectURL(file);
    placeholder.style.display = 'none';

    player.pause();
    player.src({type: file.type, src: fileURL});
    player.ready(() => {
      player.play();
    });

    player.off('error');
    player.on('error', () => {
      const err = player.error();
      alert(`播放失败：${err.message || '可能是不支持的视频编码（如 H.265）'}`);
      placeholder.style.display = 'flex';
    });
  });

  // 加载 m3u8 地址（HLS）
  function loadM3U8() {
    const url = m3u8UrlInput.value.trim();
    if (!url || !url.endsWith('.m3u8')) {
      alert('请输入有效的 .m3u8 视频地址');
      return;
    }

    placeholder.style.display = 'none';
    player.pause();

    if (Hls.isSupported()) {
      const hls = new Hls({
        maxBufferHole: 1,
        maxBufferLength: 60,
        maxMaxBufferLength: 120,
        appendErrorMaxRetry: 3
      });
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play();
      });
      hls.on(Hls.Events.ERROR, (event, data) => {
        alert('HLS 播放失败：' + data.details);
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
      video.play();
    } else {
      alert('你的浏览器不支持 HLS 播放。');
    }
  }
</script>

<script>
  // 字幕样式 逻辑

  const fontFamilySelect = document.getElementById('fontFamilySelect');
  const fontColorPicker = document.getElementById('fontColorPicker');
  const fontSizeInput = document.getElementById('fontSizeInput');
  const bgColorPicker = document.getElementById('bgColorPicker');
  const bgOpacitySlider = document.getElementById('bgOpacitySlider');
  const applyPopupStyle = document.getElementById('applyPopupStyle');

  applyPopupStyle.addEventListener('click', () => {
    popup.style.fontFamily = fontFamilySelect.value;
    popup.style.color = fontColorPicker.value;
    popup.style.fontSize = fontSizeInput.value + 'px';

    const bgColor = bgColorPicker.value;
    const opacity = parseFloat(bgOpacitySlider.value);
    popup.style.backgroundColor = hexToRgba(bgColor, opacity);
  });

  function hexToRgba(hex, opacity) {
    const r = parseInt(hex.substr(1, 2), 16);
    const g = parseInt(hex.substr(3, 2), 16);
    const b = parseInt(hex.substr(5, 2), 16);
    return `rgba(${r}, ${g}, ${b}, ${opacity})`;
  }


  // 字幕浮窗 逻辑
  const popupOriginal = document.getElementById('popupOriginal');
  const popupTranslation = document.getElementById('popupTranslation');
  const toggleTranslationButton = document.getElementById('toggleTranslation');

  let showTranslation = true;

  toggleTranslationButton.addEventListener('click', () => {
    showTranslation = !showTranslation;
    popupTranslation.style.display = showTranslation ? 'block' : 'none';
    toggleTranslationButton.textContent = showTranslation ? '隐藏翻译' : '显示翻译';
  });

  const popup = document.getElementById('subtitlePopup');
  const popupText = document.getElementById('popupText');
  const closePopup = document.getElementById('closePopup');
  const togglePopup = document.getElementById('togglePopup');

  let popupEnabled = false;

  togglePopup.addEventListener('click', () => {
    popupEnabled = !popupEnabled;
    popup.style.display = popupEnabled ? 'block' : 'none';
    togglePopup.textContent = popupEnabled ? '关闭字幕浮窗' : '开启字幕浮窗';
  });

  closePopup.addEventListener('click', () => {
    popupEnabled = false;
    popup.style.display = 'none';
    togglePopup.textContent = '开启字幕浮窗';
  });

  // 拖动功能
  let isDragging = false;
  let offsetX = 0;
  let offsetY = 0;

  popup.addEventListener('mousedown', function (e) {
    isDragging = true;
    offsetX = e.clientX - popup.offsetLeft;
    offsetY = e.clientY - popup.offsetTop;
  });

  document.addEventListener('mousemove', function (e) {
    if (isDragging) {
      popup.style.left = (e.clientX - offsetX) + 'px';
      popup.style.top = (e.clientY - offsetY) + 'px';
    }
  });

  document.addEventListener('mouseup', function () {
    isDragging = false;
  });


  const startButton = document.querySelector('button[type="submit"]');
  const stopButton = document.getElementById('stopButton');
  const clearButton = document.getElementById('clearButton');
  const exportButton = document.getElementById('exportButton');
  const statusDisplay = document.getElementById('engineStatus');
  const subtitleCountDisplay = document.getElementById('subtitleCount');
  const subtitlesDiv = document.getElementById('subtitles');
  const socket = io();

  let subtitlesList = [];  // 记录所有字幕（用于统计和导出）

  function setEngineStatus(statusText, emoji) {
    statusDisplay.textContent = `字幕引擎状态：${emoji} ${statusText}`;
  }

  function toggleButtons(isRunning) {
    startButton.disabled = isRunning;
    stopButton.disabled = !isRunning;
  }

  function updateSubtitleCount() {
    subtitleCountDisplay.textContent = `字幕条数：${subtitlesList.length}`;
  }

  document.getElementById('recognitionForm').addEventListener('submit', function (event) {
    event.preventDefault();
    fetch('/start_recognition', {
      method: 'POST',
      body: new FormData(this)
    })
      .then(res => {
        setEngineStatus('运行中', '🟢');
        toggleButtons(true);
        console.log("识别已启动");
      })
      .catch(err => {
        setEngineStatus('启动失败', '⚠️');
        console.error("识别启动失败", err);
      });
  });

  stopButton.addEventListener('click', function () {
    fetch('/stop_recognition', {method: 'POST'})
      .then(res => {
        setEngineStatus('已停止', '🛑');
        toggleButtons(false);
        console.log("识别已停止");
      })
      .catch(err => {
        setEngineStatus('停止失败', '⚠️');
        console.error("停止失败", err);
      });
  });

  clearButton.addEventListener('click', function () {
    subtitlesDiv.innerHTML = '';
    subtitlesList = [];
    updateSubtitleCount();
    console.log("字幕已清空");
  });

  exportButton.addEventListener('click', function () {
    if (subtitlesList.length === 0) {
      alert("没有可导出的字幕。");
      return;
    }

    const srtContent = subtitlesList.map((item, index) => {
      const start = formatTime(item.start_time);
      const end = formatTime(item.end_time);
      return `${index + 1}\n${start} --> ${end}\n${item.original}\n${item.translated}\n`;
    }).join('\n');

    const blob = new Blob([srtContent], {type: 'text/plain'});
    const url = URL.createObjectURL(blob);

    const a = document.createElement('a');
    a.href = url;
    a.download = 'subtitles.srt';
    a.click();

    URL.revokeObjectURL(url);
  });

  function formatTime(seconds) {
    const sec = parseFloat(seconds);
    const hrs = Math.floor(sec / 3600).toString().padStart(2, '0');
    const min = Math.floor((sec % 3600) / 60).toString().padStart(2, '0');
    const s = (sec % 60).toFixed(3).padStart(6, '0').replace('.', ',');
    return `${hrs}:${min}:${s}`;
  }


  // 实时动态字幕 逻辑
  socket.on('subtitle', data => {
    const block = document.createElement('div');
    block.classList.add('subtitle-block');

    const timeInfo = document.createElement('div');
    timeInfo.textContent = `⏱ ${data.start_time} - ${data.end_time} 秒 | 🎙 说话人 ${data.speaker}`;

    const orig = document.createElement('div');
    orig.classList.add('original');
    orig.textContent = '🗣 原文：' + data.original;

    const trans = document.createElement('div');
    trans.classList.add('translated');
    trans.textContent = '🌐 翻译：' + data.translated;

    block.appendChild(timeInfo);
    block.appendChild(orig);
    block.appendChild(trans);

    subtitlesDiv.appendChild(block);
    subtitlesDiv.scrollTop = subtitlesDiv.scrollHeight;

    subtitlesList.push({
      start_time: data.start_time,
      end_time: data.end_time,
      original: data.original,
      translated: data.translated
    });

    updateSubtitleCount();

    if (popupEnabled) {
      popupOriginal.textContent = '原文：' + (data.original || '...');
      popupTranslation.textContent = '翻译：' + (data.translated || '...');
      popupTranslation.style.display = showTranslation ? 'block' : 'none';
    }
  });

  toggleButtons(false);
  updateSubtitleCount();

</script>
</body>
</html>
