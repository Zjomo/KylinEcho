<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基于OpenKylin的AI视频处理系统</title>
    <style>
        :root {
            --primary-blue: #1a73e8;
            --light-blue: #4285f4;
            --pale-blue: #e8f0fe;
            --accent-blue: #8ab4f8;
            --dark-blue: #1557b0;
            --card-shadow: 0 8px 30px rgba(66, 133, 244, 0.15);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: var(--transition);
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f0f7ff, #e6f0ff);
            color: #333;
            padding: 30px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.6;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 28px;
            max-width: 1280px;
            width: 100%;
            margin: 0 auto;
        }

        .container > .card:nth-child(1) {
            grid-column: 1 / 5;
        }

        .container > .card:nth-child(2){
            grid-column: 1 / 3;
        }

        .container > .card:nth-child(3) {
            grid-column: 3 / 5;
        }

        .container > .card:nth-child(4){
            grid-column: 1 / 3;
        }

        .container > .card:nth-child(5) {
            grid-column: 3 / 5;
        }

        .card {
            background-color: white;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            padding: 30px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(66, 133, 244, 0.15);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--light-blue), var(--primary-blue));
        }

        .card-header {
            margin-bottom: 24px;
            text-align: center;
            position: relative;
            padding-bottom: 15px;
        }

        .card-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: var(--light-blue);
            border-radius: 3px;
        }

        .card-title {
            font-size: 1.8em;
            margin-bottom: 10px;
            color: var(--dark-blue);
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .card-description {
            font-size: 1.1em;
            color: #5f6368;
            font-weight: 400;
        }

        .card-content {
            display: grid;
            gap: 18px;
        }

        .textarea {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #d2e3fc;
            font-size: 1.1em;
            background: #f8fbff;
            color: #333;
            min-height: 120px;
            resize: vertical;
            transition: var(--transition);
            font-family: inherit;
        }

        .textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(66, 133, 244, 0.2);
        }

        .input-group {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: center;
        }

        .input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid #d2e3fc;
            font-size: 1.1em;
            background: #f8fbff;
            color: #333;
            transition: var(--transition);
        }

        .input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(66, 133, 244, 0.2);
        }

        .button {
            padding: 14px 28px;
            background: linear-gradient(135deg, var(--light-blue), var(--primary-blue));
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 500;
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.25);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .button::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary-blue), var(--dark-blue));
            opacity: 0;
            transition: var(--transition);
            z-index: -1;
        }

        .button:hover {
            box-shadow: 0 6px 16px rgba(26, 115, 232, 0.35);
            transform: translateY(-2px);
        }

        .button:hover::before {
            opacity: 1;
        }

        .card-footer {
            margin-top: 20px;
            text-align: right;
        }

        .card-footer .button {
            width: auto;
        }

        /* 状态指示器 */
        .status-indicator {
            display: flex;
            align-items: center;
            margin-top: 10px;
            font-size: 0.9em;
            color: #5f6368;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #34a853;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* 响应式调整 */
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr 1fr;
            }

            .container > .card:nth-child(1) {
                grid-column: 1 / 3;
            }

            .container > .card:nth-child(2),
            .container > .card:nth-child(3),
            .container > .card:nth-child(4),
            .container > .card:nth-child(5) {
                grid-column: 1 / 3;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 20px;
            }

            .container {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .container > .card:nth-child(1),
            .container > .card:nth-child(2),
            .container > .card:nth-child(3),
            .container > .card:nth-child(4),
            .container > .card:nth-child(5) {
                grid-column: 1;
            }

            .card {
                padding: 24px;
            }
        }

        /* 科技感装饰元素 */
        .tech-pattern {
            position: absolute;
            top: 0;
            right: 0;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, transparent 50%, rgba(138, 180, 248, 0.1) 50%);
            border-bottom-left-radius: 16px;
            z-index: 0;
        }

        .card:nth-child(2) .tech-pattern { background: linear-gradient(135deg, transparent 50%, rgba(138, 180, 248, 0.08) 50%); }
        .card:nth-child(3) .tech-pattern { background: linear-gradient(135deg, transparent 50%, rgba(138, 180, 248, 0.06) 50%); }
        .card:nth-child(4) .tech-pattern { background: linear-gradient(135deg, transparent 50%, rgba(138, 180, 248, 0.04) 50%); }
        .card:nth-child(5) .tech-pattern { background: linear-gradient(135deg, transparent 50%, rgba(138, 180, 248, 0.02) 50%); }

        /* 文件上传样式增强 */
        .file-upload-container {
            position: relative;
            border: 2px dashed #d2e3fc;
            border-radius: 10px;
            padding: 25px;
            text-align: center;
            background: #f8fbff;
            transition: var(--transition);
        }

        .file-upload-container:hover {
            border-color: var(--accent-blue);
            background: #edf4ff;
        }

        .file-upload-container i {
            font-size: 2.5em;
            color: var(--light-blue);
            margin-bottom: 15px;
            display: block;
        }

        .file-upload-container .upload-text {
            color: #5f6368;
            margin-bottom: 15px;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- 大语言模型 -->
        <div class="card">
            <div class="tech-pattern"></div>
            <div class="card-header">
                <h2 class="card-title">大语言模型</h2>
                <p class="card-description">与大语言模型进行交互，以生成、分析和转换文本</p>
            </div>
            <div class="card-content">
                <textarea id="text-prompt" placeholder="在此处输入您的提示..." class="textarea"></textarea>
                <textarea id="text-response" placeholder="模型响应将显示在这里..." class="textarea" readonly></textarea>
            </div>
            <div class="card-footer">
                <div class="status-indicator">
                    <div class="status-dot"></div>
                    <span>AI服务已就绪</span>
                </div>
                <button class="button" onclick="submitText()">
                    <i class="fas fa-paper-plane"></i> 提交请求
                </button>
            </div>
        </div>

        <!-- 视频剪辑处理 -->
        <div class="card">
            <div class="tech-pattern"></div>
            <div class="card-header">
                <h2 class="card-title">AI视频剪辑</h2>
                <p class="card-description">上传MP4视频文件，我们将在后台处理它</p>
            </div>
            <div class="card-content">
                <div class="file-upload-container">
                    <i class="fas fa-video"></i>
                    <div class="upload-text">拖放视频文件或点击上传</div>
                    <div class="input-group">
                        <input type="file" id="video-file" accept="video/mp4" class="input">
                        <button class="button" onclick="uploadVideo()">
                            <i class="fas fa-upload"></i> 上传
                        </button>
                    </div>
                </div>
                <textarea id="video-response" placeholder="处理后的视频文件将在此处显示。" class="textarea" readonly></textarea>
            </div>
        </div>


        <!-- 图片解析 -->
        <div class="card">
            <div class="tech-pattern"></div>
            <div class="card-header">
                <h2 class="card-title">图片解析</h2>
                <p class="card-description">上传图像文件，我们将分析其内容</p>
            </div>
            <div class="card-content">
                <div class="file-upload-container">
                    <i class="fas fa-image"></i>
                    <div class="upload-text">拖放图片文件或点击上传</div>
                    <div class="input-group">
                        <input type="file" id="image-file" accept="image/jpeg,image/png" class="input">
                        <button class="button" onclick="uploadImage()">
                            <i class="fas fa-upload"></i> 上传
                        </button>
                    </div>
                </div>
                <textarea id="image-response" placeholder="图像分析结果将在此处显示。" class="textarea" readonly></textarea>
            </div>
        </div>

        <!-- 语音合成 -->
        <div class="card">
            <div class="tech-pattern"></div>
            <div class="card-header">
                <h2 class="card-title">语音合成</h2>
                <p class="card-description">输入文本，我们将其转换为WAV音频文件</p>
            </div>
            <div class="card-content">
                <textarea id="synthesis-text" placeholder="输入要合成的文本..." class="textarea"></textarea>
                <button class="button" onclick="generateAudio()">
                    <i class="fas fa-wave-square"></i> 生成音频
                </button>
                <textarea id="audio-response" placeholder="生成的音频文件将在此处显示。" class="textarea" readonly></textarea>
            </div>
        </div>

        <!-- 语音识别 -->
        <div class="card">
            <div class="tech-pattern"></div>
            <div class="card-header">
                <h2 class="card-title">语音识别</h2>
                <p class="card-description">上传WAV音频文件，我们将其转录为文本</p>
            </div>
            <div class="card-content">
                <div class="file-upload-container">
                    <i class="fas fa-microphone-alt"></i>
                    <div class="upload-text">拖放音频文件或点击上传</div>
                    <div class="input-group">
                        <input type="file" id="audio-file" accept="audio/wav" class="input">
                        <button class="button" onclick="uploadAudio()">
                            <i class="fas fa-upload"></i> 上传
                        </button>
                    </div>
                </div>
                <textarea id="transcription-response" placeholder="转录的文本将在此处显示。" class="textarea" readonly></textarea>
            </div>
        </div>
    </div>

    <script>
        function submitText() {
            const prompt = document.getElementById('text-prompt').value;
            if (!prompt.trim()) {
                alert('请输入有效的提示内容');
                return;
            }

            // 显示加载状态
            const responseArea = document.getElementById('text-response');
            responseArea.value = "AI正在处理您的请求，请稍候...";

            fetch('/api/language-model', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ prompt }),
            })
            .then(response => response.json())
            .then(data => {
                responseArea.value = data.response;
            })
            .catch(error => {
                console.error('Error:', error);
                responseArea.value = "处理请求时出错，请稍后再试。";
            });
        }

        function uploadVideo() {
            const fileInput = document.getElementById('video-file');
            if (!fileInput.files || fileInput.files.length === 0) {
                alert('请选择要上传的视频文件');
                return;
            }

            const responseArea = document.getElementById('video-response');
            responseArea.value = "视频处理中，请稍候...";

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            fetch('/api/video-processing', {
                method: 'POST',
                body: formData,
            })
            .then(response => {
                if (response.ok) {
                    return response.blob();
                } else {
                    return response.json().then(error => {
                        throw new Error(error.error);
                    });
                }
            })
            .then(blob => {
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'processed_video.mp4';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                responseArea.value = '视频处理完成，已开始下载。';
            })
            .catch(error => {
                console.error('Error:', error);
                responseArea.value = `视频处理失败: ${error.message}`;
            });
        }

        function uploadImage() {
            const fileInput = document.getElementById('image-file');
            if (!fileInput.files || fileInput.files.length === 0) {
                alert('请选择要上传的图片');
                return;
            }

            const responseArea = document.getElementById('image-response');
            responseArea.value = "图片分析中，请稍候...";

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            fetch('/api/image-parsing', {
                method: 'POST',
                body: formData,
            })
            .then(response => response.json())
            .then(data => {
                responseArea.value = data.analysis;
            })
            .catch(error => {
                console.error('Error:', error);
                responseArea.value = "图片分析失败，请稍后再试。";
            });
        }

        function generateAudio() {
            const text = document.getElementById('synthesis-text').value;
            if (!text.trim()) {
                alert('请输入要合成的文本内容');
                return;
            }

            const responseArea = document.getElementById('audio-response');
            responseArea.value = "音频生成中，请稍候...";

            fetch('/api/speech-synthesis', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ text }),
            })
            .then(response => response.blob())
            .then(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'synthesized.wav';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                responseArea.value = "音频生成完成，已开始下载。";
            })
            .catch(error => {
                console.error('Error:', error);
                responseArea.value = "音频生成失败，请稍后再试。";
            });
        }

        function uploadAudio() {
            const fileInput = document.getElementById('audio-file');
            if (!fileInput.files || fileInput.files.length === 0) {
                alert('请选择要上传的音频文件');
                return;
            }

            const responseArea = document.getElementById('transcription-response');
            responseArea.value = "语音识别中，请稍候...";

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            fetch('/api/speech-recognition', {
                method: 'POST',
                body: formData,
            })
            .then(response => response.json())
            .then(data => {
                responseArea.value = data.transcription;
            })
            .catch(error => {
                console.error('Error:', error);
                responseArea.value = "语音识别失败，请稍后再试。";
            });
        }
    </script>
</body>
</html>
